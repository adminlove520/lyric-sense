<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricSense - 歌词视野</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #0d1117;
            --surface:   rgba(255,255,255,0.06);
            --surface2:  rgba(255,255,255,0.10);
            --accent:    #00d2ff;
            --accent2:   #3a7bd5;
            --text:      #e6edf3;
            --text-muted:#7d8590;
            --error:     #f85149;
            --success:   #3fb950;
            --warn:      #e3b341;
            --radius:    12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC',
                         Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 60px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 6px;
        }

        /* ── Settings bar ── */
        .settings-bar {
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .settings-bar label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }
        .settings-bar select,
        .settings-bar input[type=text].api-input {
            font-size: 0.82rem;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }
        .settings-bar select { cursor: pointer; }
        .settings-bar input[type=text].api-input { flex: 1; min-width: 180px; }
        .settings-bar input[type=text].api-input:focus { border-color: var(--accent); }

        /* ── Search ── */
        .search-box {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 18px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 680px;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .input-row:last-child { margin-bottom: 0; }
        input[type=text] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color .2s;
        }
        input[type=text]::placeholder { color: var(--text-muted); }
        input[type=text]:focus { outline: none; border-color: var(--accent); }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            white-space: nowrap;
        }
        button:hover { opacity: .88; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.secondary {
            background: var(--surface2);
            color: var(--text);
            font-weight: 400;
        }
        button.secondary:hover { background: rgba(255,255,255,0.15); }
        button.danger {
            background: rgba(248,81,73,0.15);
            color: var(--error);
        }

        /* ── Player info ── */
        .player-info {
            display: none;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 680px;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius);
            padding: 16px;
        }
        .cover {
            width: 90px; height: 90px;
            border-radius: 8px;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .cover img { width: 100%; height: 100%; object-fit: cover; }
        .song-meta { flex: 1; min-width: 0; }
        .song-title {
            font-size: 1.2rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-artist { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .song-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .song-actions a {
            font-size: 0.8rem; color: var(--accent);
            text-decoration: none; padding: 4px 10px;
            border: 1px solid var(--accent);
            border-radius: 20px;
            transition: background .2s;
        }
        .song-actions a:hover { background: rgba(0,210,255,0.1); }

        /* ── Lyrics container ── */
        .lyrics-wrap {
            width: 100%;
            max-width: 680px;
        }
        .lyrics-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }
        .lyrics-toolbar .source-tag {
            font-size: 0.78rem;
            color: var(--text-muted);
            background: var(--surface);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .lyrics-toolbar-actions { display: flex; gap: 6px; }
        .lyrics-toolbar-actions button { padding: 5px 12px; font-size: 0.78rem; }

        .lyrics-container {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 24px 20px;
            min-height: 280px;
            max-height: 480px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .lyrics-container::-webkit-scrollbar { width: 6px; }
        .lyrics-container::-webkit-scrollbar-track { background: transparent; }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15); border-radius: 3px;
        }

        .lyric-line {
            padding: 9px 12px;
            margin: 3px 0;
            border-radius: 6px;
            transition: all .25s ease;
            color: rgba(255,255,255,0.45);
            font-size: 1rem;
            line-height: 1.6;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .lyric-line:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,.7); }
        .lyric-line.active {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(0,210,255,0.08);
        }
        .lyric-line.past { color: rgba(255,255,255,0.28); }
        .time-tag {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.22);
            font-family: 'SF Mono', monospace;
            flex-shrink: 0;
            min-width: 36px;
        }
        .lyric-line.active .time-tag { color: rgba(0,210,255,0.5); }

        /* ── Progress ── */
        .progress-area {
            display: none;
            width: 100%;
            max-width: 680px;
            margin-top: 14px;
        }
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar:hover { height: 7px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            transition: width 0.3s linear;
            pointer-events: none;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* ── Controls ── */
        .controls {
            display: none;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 680px;
        }

        /* ── State messages ── */
        .msg-box {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .msg-box.error { color: var(--error); }
        .msg-box.loading::after {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-left: 6px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── Skeleton loader ── */
        .skeleton-line {
            height: 14px;
            background: linear-gradient(90deg, rgba(255,255,255,.04) 25%,
                        rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 4px;
            margin: 12px 0;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── Notification toast ── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30,30,40,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text);
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 0.88rem;
            transition: transform .3s ease;
            z-index: 999;
            white-space: nowrap;
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── API info footer ── */
        .api-footer {
            margin-top: 32px;
            padding: 14px 18px;
            background: var(--surface);
            border-radius: var(--radius);
            font-size: 0.8rem;
            color: var(--text-muted);
            width: 100%;
            max-width: 680px;
            line-height: 1.9;
        }
        .api-footer code {
            background: rgba(255,255,255,0.08);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.78rem;
            color: var(--accent);
        }
        .api-footer a { color: var(--accent); text-decoration: none; }
        .api-footer a:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .input-row { flex-direction: column; }
            .player-info { flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎵 LyricSense</h1>
    <p class="subtitle">让 AI 真正「听」懂音乐 · 歌词视野</p>
</div>

<!-- API 设置 -->
<div class="settings-bar">
    <label>API 源：</label>
    <select id="apiMode" onchange="onApiModeChange()">
        <option value="public">公共 api.lrc.cx（默认）</option>
        <option value="local">本地 localhost:8080</option>
        <option value="custom">自定义地址</option>
    </select>
    <input type="text" class="api-input" id="customApiUrl"
           placeholder="http://localhost:8080" style="display:none"
           oninput="saveApiUrl()">
</div>

<!-- 搜索框 -->
<div class="search-box">
    <div class="input-row">
        <input type="text" id="artist" placeholder="歌手（如：颜人中）" onkeydown="onEnter(event)">
        <input type="text" id="title"  placeholder="歌曲（如：晚安）"   onkeydown="onEnter(event)">
    </div>
    <div class="input-row">
        <button onclick="fetchLyrics()">🔍 搜索歌词</button>
        <button class="secondary" onclick="clearAll()">清空</button>
        <button class="secondary" id="retryBtn" style="display:none" onclick="fetchLyrics()">↺ 重试</button>
    </div>
</div>

<!-- 歌曲信息 -->
<div class="player-info" id="playerInfo">
    <div class="cover" id="cover">🎵</div>
    <div class="song-meta">
        <div class="song-title"  id="songTitle">歌曲名</div>
        <div class="song-artist" id="songArtist">歌手</div>
        <div class="song-actions" id="songActions"></div>
    </div>
</div>

<!-- 歌词区域 -->
<div class="lyrics-wrap">
    <div class="lyrics-toolbar" id="lyricsToolbar" style="display:none">
        <span class="source-tag" id="sourceTag">—</span>
        <div class="lyrics-toolbar-actions">
            <button class="secondary" onclick="copyLyrics()">📋 复制歌词</button>
            <button class="secondary" onclick="openInNewTab()">🔗 新页面</button>
        </div>
    </div>
    <div class="lyrics-container" id="lyricsContainer">
        <div class="msg-box">输入歌手和歌曲名，搜索歌词</div>
    </div>
</div>

<!-- 进度 -->
<div class="progress-area" id="progressArea">
    <div class="progress-bar" id="progressBar" onclick="seekToClick(event)">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="time-row">
        <span id="currentTime">00:00</span>
        <span id="totalTime">00:00</span>
    </div>
</div>

<!-- 控制按钮 -->
<div class="controls" id="controls">
    <button id="playBtn" onclick="togglePlay()">▶ 播放</button>
    <button class="secondary" onclick="prevLine()">◀ 上一句</button>
    <button class="secondary" onclick="nextLine()">下一句 ▶</button>
</div>

<!-- API 说明 -->
<div class="api-footer">
    📡 API：<code id="apiDisplay">https://api.lrc.cx</code>
    &nbsp;·&nbsp;
    🖼️ 封面 + 歌词同步获取
    &nbsp;·&nbsp;
    🦞 <a href="https://github.com/adminlove520/lyric-sense" target="_blank">GitHub</a>
    &nbsp;·&nbsp;
    📅 联动 <a href="https://github.com/adminlove520/netease-daily-v3" target="_blank">netease-daily-v3</a>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── 状态 ──────────────────────────────────────────────
let lyrics      = [];   // [{time:秒, text:字符串}, ...]
let currentLine = 0;
let isPlaying   = false;
let rafId       = null;
let playStartWallMs  = 0;  // 开始播放时的 Date.now()
let playStartLrcSec  = 0;  // 开始播放时对应的 LRC 时间（秒）
let totalDurationSec = 0;
let rawLrcText  = '';

// ── API 配置 ──────────────────────────────────────────
const PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
];
let currentProxyIdx = 0;

function getApiBase() {
    const mode = document.getElementById('apiMode').value;
    if (mode === 'public') return 'https://api.lrc.cx';
    if (mode === 'local')  return 'http://localhost:8080';
    return (document.getElementById('customApiUrl').value.trim() || 'http://localhost:8080');
}

function isLocalApi() {
    const base = getApiBase();
    return base.startsWith('http://localhost') || base.startsWith('http://127.') || base.startsWith('http://192.');
}

async function apiFetch(url, opts = {}) {
    if (isLocalApi()) {
        const res = await fetch(url, { ...opts, signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res;
    }
    // Public API: try direct first, then proxies
    // 1) Direct fetch (may work if api.lrc.cx adds CORS in the future)
    try {
        const res = await fetch(url, { ...opts, signal: AbortSignal.timeout(15000) });
        if (res.ok) return res;
    } catch (_) { /* CORS or network error, fall through to proxies */ }
    // 2) Try proxies in order
    let lastErr;
    for (let i = 0; i < PROXIES.length; i++) {
        const idx = (currentProxyIdx + i) % PROXIES.length;
        try {
            const res = await fetch(PROXIES[idx](url), {
                ...opts,
                signal: AbortSignal.timeout(30000)
            });
            if (res.ok) {
                currentProxyIdx = idx;
                return res;
            }
            // Non-ok: some proxies return 200 with error body, try next
        } catch (e) {
            lastErr = e;
            // Continue to next proxy
        }
    }
    throw lastErr || new Error('所有代理均请求失败');
}

function onApiModeChange() {
    const mode = document.getElementById('apiMode').value;
    document.getElementById('customApiUrl').style.display = mode === 'custom' ? 'block' : 'none';
    document.getElementById('apiDisplay').textContent = getApiBase();
}

function saveApiUrl() {
    document.getElementById('apiDisplay').textContent = getApiBase();
}

// ── URL 参数自动加载 ──────────────────────────────────
function loadFromUrlParams() {
    const p = new URLSearchParams(location.search);
    const artist = p.get('artist') || '';
    const title  = p.get('title')  || '';
    if (artist || title) {
        document.getElementById('artist').value = artist;
        document.getElementById('title').value  = title;
        setTimeout(fetchLyrics, 300);
    }
}

// ── LRC 解析 ─────────────────────────────────────────
function parseLRC(lrcText) {
    const lines = lrcText.split(/\r?\n/);
    const result = [];
    // 支持 [mm:ss.xx] 和 [mm:ss:xx] 两种格式
    const timeRe = /\[(\d{1,2}):(\d{2})[.:](\d{2,3})\]/g;

    for (const line of lines) {
        const text = line.replace(/\[\d{1,2}:\d{2}[.:]\d{2,3}\]/g, '').trim();
        if (!text) continue;

        let m;
        timeRe.lastIndex = 0;
        while ((m = timeRe.exec(line)) !== null) {
            const mins = parseInt(m[1]);
            const secs = parseInt(m[2]);
            const ms   = parseInt(m[3].padEnd(3, '0'));
            result.push({ time: mins * 60 + secs + ms / 1000, text });
        }
    }

    return result
        .filter(l => l.text && !/^\[.+:.+\]$/.test(l.text)) // 过滤元数据行
        .sort((a, b) => a.time - b.time);
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// ── 骨架屏 ──────────────────────────────────────────
function showSkeleton() {
    const c = document.getElementById('lyricsContainer');
    c.innerHTML = Array.from({length: 12}, (_, i) =>
        `<div class="skeleton-line" style="width:${55+Math.random()*40}%;opacity:${1-i*0.05}"></div>`
    ).join('');
}

// ── 主搜索逻辑 ──────────────────────────────────────
async function fetchLyrics() {
    const artist = document.getElementById('artist').value.trim();
    const title  = document.getElementById('title').value.trim();

    if (!artist && !title) {
        showToast('请至少输入歌手或歌曲名');
        return;
    }

    pause();
    showSkeleton();
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('lyricsToolbar').style.display = 'none';
    document.getElementById('playerInfo').style.display = 'none';
    document.getElementById('progressArea').style.display = 'none';
    document.getElementById('controls').style.display = 'none';

    const base   = getApiBase();
    const params = new URLSearchParams();
    if (artist) params.set('artist', artist);
    if (title)  params.set('title', title);

    const lyricsUrl = `${base}/lyrics?${params}`;
    const coverUrl  = `${base}/cover?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;

    try {
        // 歌词 + 封面并行请求
        const [lyricsRes, coverRes] = await Promise.allSettled([
            apiFetch(lyricsUrl),
            (artist && title) ? apiFetch(coverUrl) : Promise.reject('skip')
        ]);

        // 处理歌词
        if (lyricsRes.status === 'rejected') throw new Error(lyricsRes.reason?.message || '歌词请求失败');
        rawLrcText = await lyricsRes.value.text();
        lyrics = parseLRC(rawLrcText);

        if (lyrics.length === 0) {
            showError('未找到歌词，请尝试其他搜索词或仅填写歌名');
            document.getElementById('retryBtn').style.display = 'inline-block';
            return;
        }

        // 处理封面
        if (coverRes.status === 'fulfilled') {
            try {
                const blob = await coverRes.value.blob();
                const url  = URL.createObjectURL(blob);
                document.getElementById('cover').innerHTML =
                    `<img src="${url}" alt="封面" onerror="this.parentElement.innerHTML='🎵'">`;
            } catch(_) { document.getElementById('cover').innerHTML = '🎵'; }
        } else {
            document.getElementById('cover').innerHTML = '🎵';
        }

        // 歌曲信息区
        document.getElementById('songTitle').textContent  = title  || '未知歌曲';
        document.getElementById('songArtist').textContent = artist || '未知歌手';

        const lyricSenseUrl = `${location.origin}${location.pathname}?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;
        const neteaseSearch = `https://music.163.com/#/search/m/?s=${encodeURIComponent((artist+' '+title).trim())}&type=1`;
        document.getElementById('songActions').innerHTML = `
            <a href="${neteaseSearch}" target="_blank">🎵 网易云</a>
            <a href="${lyricSenseUrl}" target="_blank">🔗 分享链接</a>
        `;

        document.getElementById('playerInfo').style.display = 'flex';

        // 计算总时长
        totalDurationSec = lyrics[lyrics.length - 1]?.time || 0;

        // 来源标签
        const apiTag = isLocalApi() ? '本地 API' : 'api.lrc.cx';
        document.getElementById('sourceTag').textContent = `${lyrics.length} 行 · ${apiTag}`;
        document.getElementById('lyricsToolbar').style.display = 'flex';

        // 渲染歌词
        currentLine = 0;
        renderLyrics();

        document.getElementById('progressArea').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        updateProgressBar(0);

        // 更新 URL
        const newUrl = `${location.pathname}?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;
        history.replaceState(null, '', newUrl);

        showToast(`已加载 ${lyrics.length} 行歌词`);

    } catch (err) {
        const msg = err.name === 'TimeoutError' || /timed?\s*out|timeout/i.test(err.message)
            ? '请求超时，请检查网络后重试'
            : err.message;
        showError(`获取失败：${msg}`);
        document.getElementById('retryBtn').style.display = 'inline-block';
    }
}

// ── 渲染歌词 ────────────────────────────────────────
function renderLyrics() {
    const container = document.getElementById('lyricsContainer');
    container.innerHTML = '';

    lyrics.forEach((line, idx) => {
        const div = document.createElement('div');
        div.className = 'lyric-line';
        div.dataset.idx = idx;

        const tt = document.createElement('span');
        tt.className = 'time-tag';
        tt.textContent = formatTime(line.time);

        const txt = document.createTextNode(line.text);
        div.appendChild(tt);
        div.appendChild(txt);
        div.onclick = () => seekToLine(idx);
        container.appendChild(div);
    });

    highlightLine(0, false);
}

// ── 高亮当前行 ─────────────────────────────────────
function highlightLine(idx, scroll = true) {
    const lines = document.querySelectorAll('.lyric-line');
    lines.forEach((el, i) => {
        el.classList.remove('active', 'past');
        if (i < idx) el.classList.add('past');
        else if (i === idx) el.classList.add('active');
    });
    if (scroll && lines[idx]) {
        lines[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    currentLine = idx;

    // 更新时间显示
    const t = lyrics[idx]?.time ?? 0;
    document.getElementById('currentTime').textContent = formatTime(t);
    document.getElementById('totalTime').textContent   = formatTime(totalDurationSec);
}

// ── 进度条更新 ─────────────────────────────────────
function updateProgressBar(currentSec) {
    const pct = totalDurationSec > 0 ? (currentSec / totalDurationSec) * 100 : 0;
    document.getElementById('progressFill').style.width = `${Math.min(100, pct)}%`;
    document.getElementById('currentTime').textContent  = formatTime(currentSec);
}

// ── 基于真实时间戳的播放 ───────────────────────────
function play() {
    if (isPlaying) return;
    if (lyrics.length === 0) return;

    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ 暂停';

    // 从当前行的时间戳开始
    playStartLrcSec = lyrics[currentLine]?.time ?? 0;
    playStartWallMs = performance.now();

    function tick() {
        const elapsedMs  = performance.now() - playStartWallMs;
        const currentSec = playStartLrcSec + elapsedMs / 1000;

        if (currentSec >= totalDurationSec) {
            pause();
            highlightLine(lyrics.length - 1);
            return;
        }

        // 找到当前应高亮的行
        let newLine = currentLine;
        for (let i = 0; i < lyrics.length - 1; i++) {
            if (currentSec >= lyrics[i].time && currentSec < lyrics[i + 1].time) {
                newLine = i;
                break;
            }
            if (i === lyrics.length - 2 && currentSec >= lyrics[i + 1].time) {
                newLine = lyrics.length - 1;
            }
        }

        if (newLine !== currentLine) highlightLine(newLine);
        updateProgressBar(currentSec);

        rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);
}

function pause() {
    if (!isPlaying) return;
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶ 播放';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function togglePlay() {
    isPlaying ? pause() : play();
}

// ── 跳转 ────────────────────────────────────────────
function seekToLine(idx) {
    pause();
    highlightLine(idx);
    updateProgressBar(lyrics[idx]?.time ?? 0);
}

function seekToClick(event) {
    if (lyrics.length === 0 || totalDurationSec === 0) return;
    const rect = event.currentTarget.getBoundingClientRect();
    const pct  = (event.clientX - rect.left) / rect.width;
    const targetSec = pct * totalDurationSec;

    // 找最近的行
    let nearest = 0;
    for (let i = 0; i < lyrics.length; i++) {
        if (lyrics[i].time <= targetSec) nearest = i;
        else break;
    }

    pause();
    highlightLine(nearest);
    updateProgressBar(targetSec);
}

function prevLine() {
    seekToLine(Math.max(0, currentLine - 1));
}

function nextLine() {
    seekToLine(Math.min(lyrics.length - 1, currentLine + 1));
}

// ── 复制歌词 ────────────────────────────────────────
async function copyLyrics() {
    if (!rawLrcText) return;
    try {
        await navigator.clipboard.writeText(rawLrcText);
        showToast('歌词已复制到剪贴板');
    } catch(e) {
        showToast('复制失败，请手动选取');
    }
}

function openInNewTab() {
    const artist = document.getElementById('artist').value.trim();
    const title  = document.getElementById('title').value.trim();
    const url    = `${location.origin}${location.pathname}?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`;
    window.open(url, '_blank');
}

// ── 工具 ────────────────────────────────────────────
function clearAll() {
    pause();
    document.getElementById('artist').value = '';
    document.getElementById('title').value  = '';
    document.getElementById('lyricsContainer').innerHTML = '<div class="msg-box">输入歌手和歌曲名，搜索歌词</div>';
    document.getElementById('playerInfo').style.display     = 'none';
    document.getElementById('progressArea').style.display   = 'none';
    document.getElementById('controls').style.display       = 'none';
    document.getElementById('lyricsToolbar').style.display  = 'none';
    document.getElementById('retryBtn').style.display       = 'none';
    lyrics = []; rawLrcText = '';
    history.replaceState(null, '', location.pathname);
}

function showError(msg) {
    document.getElementById('lyricsContainer').innerHTML =
        `<div class="msg-box error">❌ ${msg}</div>`;
}

let toastTimer;
function showToast(msg, duration = 2400) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function onEnter(e) {
    if (e.key === 'Enter') fetchLyrics();
}

// ── 键盘快捷键 ──────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    else if (e.code === 'ArrowLeft')  prevLine();
    else if (e.code === 'ArrowRight') nextLine();
});

// ── 初始化 ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    onApiModeChange();
    loadFromUrlParams();
});
</script>
